name: Profile integrity

on:
  pull_request:
    paths:
      - README.md
      - .github/scripts/**
      - .github/workflows/**
  push:
    branches:
      - main
    paths:
      - README.md
      - .github/scripts/**
      - .github/workflows/**
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Validate profile contract
        run: |
          node --check .github/scripts/generate-lane-defense.mjs
          node --check .github/scripts/generate-profile-cards.mjs
          node --check .github/scripts/validate-profile.mjs
          node .github/scripts/validate-profile.mjs
