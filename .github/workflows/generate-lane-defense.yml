name: Generate lane defense

on:
  schedule:
    - cron: "15 0 * * *" # daily, offset from the snake so the battle rotates each day
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: profile-output
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout main
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Generate lane defense assets
        run: node .github/scripts/generate-lane-defense.mjs

      - name: Checkout output branch
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: output
          path: output

      - name: Publish lane defense assets
        run: |
          ls -lh dist/lane-defense*
          cp dist/lane-defense* output/
          cd output
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add lane-defense.svg lane-defense-light.svg
          git status --short
          git diff --cached --quiet && exit 0
          git commit -m "Update lane defense battle"
          git push origin HEAD:output
