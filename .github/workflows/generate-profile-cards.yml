name: Generate profile cards

on:
  schedule:
    - cron: "20 0 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: profile-output
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          path: source

      - name: Generate profile cards
        working-directory: source
        env:
          GITHUB_TOKEN: ${{ github.token }}
          PROFILE_USER: okturan
        run: node .github/scripts/generate-profile-cards.mjs

      - name: Checkout output branch
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: output
          path: output

      - name: Copy generated cards
        run: |
          ls -lh source/dist/profile-*.svg
          cp source/dist/profile-*.svg output/
          ls -lh output/profile-*.svg

      - name: Publish generated cards
        working-directory: output
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add profile-*.svg
          git status --short
          git diff --cached --quiet && exit 0
          git commit -m "Update profile cards"
          git push origin HEAD:output
