name: Generate profile cards

on:
  schedule:
    - cron: "20 0 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          path: source

      - name: Generate profile cards
        working-directory: source
        run: node .github/scripts/generate-profile-cards.mjs

      - name: Checkout output branch
        uses: actions/checkout@v4
        with:
          ref: output
          path: output

      - name: Copy generated cards
        run: cp source/dist/profile-*.svg output/

      - name: Publish generated cards
        working-directory: output
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add profile-anime.svg profile-facts.svg
          git diff --cached --quiet && exit 0
          git commit -m "Update profile cards"
          git push
