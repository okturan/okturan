name: Generate contribution snake

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: profile-output
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Generate snake assets
        uses: Platane/snk@v3
        with:
          github_user_name: okturan
          outputs: |
            dist/github-contribution-grid-snake.svg?palette=github-light
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark
            dist/github-contribution-grid-snake.gif

      - name: Checkout output branch
        uses: actions/checkout@v4
        with:
          ref: output
          path: output

      - name: Publish snake assets
        run: |
          ls -lh dist/github-contribution-grid-snake*
          cp dist/github-contribution-grid-snake* output/
          cd output
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add github-contribution-grid-snake.svg github-contribution-grid-snake-dark.svg github-contribution-grid-snake.gif
          git status --short
          git diff --cached --quiet && exit 0
          git commit -m "Update contribution snake"
          git push origin HEAD:output
